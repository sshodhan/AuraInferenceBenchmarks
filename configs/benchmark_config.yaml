# AuraInferenceBenchmarks Configuration
# Adjust these settings based on your hardware

server:
  host: "localhost"
  port: 8000
  base_url: "http://localhost:8000/v1"

models:
  small:
    name: "Qwen/Qwen2.5-0.5B-Instruct"
    label: "Qwen2.5-0.5B"
  medium:
    name: "Qwen/Qwen2.5-1.5B-Instruct"
    label: "Qwen2.5-1.5B"
  # For systems with more VRAM (24GB+)
  large:
    name: "Qwen/Qwen2.5-3B-Instruct"
    label: "Qwen2.5-3B"

# Default model for labs 1-3, 6
default_model: "Qwen/Qwen2.5-1.5B-Instruct"

lab2:
  prompt_lengths: [100, 500, 1000, 2000, 4000]
  output_tokens: 100
  warmup_requests: 2

lab3:
  concurrency_levels: [1, 4, 8, 16]
  requests_per_level: 16
  output_tokens: 100
  prompt_tokens: 512

lab5:
  quantized_model: "Qwen/Qwen2.5-1.5B-Instruct-AWQ"
  concurrency: 4
  output_tokens: 100
  prompt_tokens: 512

lab6:
  system_prompt_tokens: 2000
  num_requests: 10
  output_tokens: 100

output:
  results_dir: "results"
  save_plots: true
  save_csv: true
